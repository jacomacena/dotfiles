############################
### Hyprland dotfiles    ###
############################

$mod = SUPER
$terminal = terminator
$launcher = rofi -show drun -show-icons
$fileManager = pcmanfm
$browser = firefox

monitor = eDP-1,preferred,auto,1
monitor = HDMI-A-1,preferred,auto-right,1
monitor = ,preferred,auto,1

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(65a1d8ff)
    col.inactive_border = rgba(839496ff)
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

input {
    kb_layout = br
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

gestures {
    workspace_swipe = true
}

exec-once = sh -c 'command -v nm-applet >/dev/null && nm-applet'
exec-once = sh -c 'command -v numlockx >/dev/null && numlockx on'
exec-once = sh -c 'command -v /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 >/dev/null && /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1'
exec-once = sh -c 'command -v swww >/dev/null && swww init && swww img "$HOME/.config/pictures/1.jpg"'
exec-once = sh -c 'command -v waybar >/dev/null && waybar'

bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, Q, exit

bind = $mod, Return, exec, $terminal
bind = $mod, D, exec, $launcher
bind = $mod, Q, killactive
bind = ALT, F4, killactive
bind = $mod, Space, togglefloating
bind = $mod, F, fullscreen
bind = $mod, P, pseudo
bind = $mod, V, togglesplit

bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, I, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, I, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

bind = ALT, left, resizeactive, -20 0
bind = ALT, right, resizeactive, 20 0
bind = ALT, up, resizeactive, 0 -20
bind = ALT, down, resizeactive, 0 20

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod ALT, left, workspace, previous
bind = $mod ALT, right, workspace, next

bind = $mod, O, submap, apps
submap = apps
bind = , W, exec, $browser
bind = , W, submap, reset
bind = , F, exec, $fileManager
bind = , F, submap, reset
bind = , C, exec, code
bind = , C, submap, reset
bind = , S, exec, spotify
bind = , S, submap, reset
bind = , T, exec, telegram-desktop
bind = , T, submap, reset
bind = , V, exec, virtualbox
bind = , V, submap, reset
bind = , Escape, submap, reset
submap = reset

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioRaiseVolume, exec, pamixer -i 2
bind = , XF86AudioLowerVolume, exec, pamixer -d 2
bind = , XF86MonBrightnessUp, exec, $HOME/.config/bin/brightness up 10
bind = , XF86MonBrightnessDown, exec, $HOME/.config/bin/brightness down 10

bind = , Print, exec, mkdir -p "$HOME/Pictures/shots" && grim "$HOME/Pictures/shots/$(date +%Y-%m-%d_%H-%M-%S).png"
bind = SHIFT, Print, exec, mkdir -p "$HOME/Pictures/shots" && grim -g "$(slurp)" "$HOME/Pictures/shots/$(date +%Y-%m-%d_%H-%M-%S).png"

workspace = 1,monitor:eDP-1
workspace = 2,monitor:eDP-1
workspace = 3,monitor:eDP-1
workspace = 4,monitor:eDP-1
workspace = 5,monitor:eDP-1
workspace = 6,monitor:eDP-1
workspace = 7,monitor:eDP-1
workspace = 8,monitor:HDMI-A-1
workspace = 9,monitor:eDP-1
workspace = 10,monitor:HDMI-A-1

windowrulev2 = float,class:^(GParted|Nitrogen|Pavucontrol|Blueman-manager|gnome-calculator)$
windowrulev2 = float,title:^(alsamixer|sudo)$
windowrulev2 = workspace 2,class:^(firefox|google-chrome)$
windowrulev2 = workspace 3,class:^(pcmanfm)$
windowrulev2 = workspace 4,class:^(Spotify|transmission-gtk)$
windowrulev2 = workspace 5,class:^(telegram-desktop|TelegramDesktop)$
windowrulev2 = workspace 6,class:^(libreoffice|Soffice|gedit|code|Code)$
windowrulev2 = workspace 7,class:^(VirtualBoxVM)$
windowrulev2 = workspace 8,class:^(VirtualBox Manager|anydesk)$
windowrulev2 = workspace 10,class:^(binance|exodus|monero-core)$
